<section class="mb-8" id="contacto">
  <div class="container mx-auto px-4 md:px-6 max-w-4xl">
    <div class="text-center mb-8 lg:mb-7">
      <h2 class="text-golden-300 text-sm md:text-lg font-semibold uppercase tracking-wide">
        Te responderemos lo antes posible
      </h2>
      <h3 class="text-madison-800 text-3xl md:text-3xl font-bold mt-2 leading-tight font-display">
        Cuéntanos tu caso
      </h3>
    </div>

    <form [formGroup]="messageForm" (ngSubmit)="onSubmit()" class="space-y-6 max-lg:px-8">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <app-float-form-input label="Nombre completo" [control]="name" type="text">
        </app-float-form-input>
        <app-float-form-input label="Correo electrónico" [control]="email" type="text" preset="email">
        </app-float-form-input>
        <app-float-form-input label="Teléfono" [control]="phone" type="text">
        </app-float-form-input>
      </div>

      <app-float-form-input label="Mensaje" [control]="message" type="textarea" [rows]="4">
      </app-float-form-input>

      <div class="flex justify-center mt-4 max-sm:flex-col">
        <p-button icon="pi pi-send" label="Enviar mensaje" type="submit" [disabled]="!messageForm.valid"
          styleClass="w-full" class="mt-2">
        </p-button>
      </div>
    </form>
  </div>
</section>
