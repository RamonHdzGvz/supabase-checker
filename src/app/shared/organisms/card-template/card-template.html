<div class="container mx-auto px-4">
  <div class="flex flex-col md:flex-row justify-center items-stretch max-w-4xl mx-auto">
    <div class="flex-1 bg-white rounded-xl shadow-sm p-6 md:p-8 text-center flex flex-col md:h-96">
      <div class="flex justify-center mb-4">
        <div class="w-20 h-20 rounded-full bg-madison-800 flex items-center justify-center">
          <i [class]="iconClass" class="text-golden-300 ml-0.5" style="font-size: 2.75rem"></i>
        </div>
      </div>
      <div class="grow">
        <h3 class="text-xl font-bold text-madison-800 mb-3 uppercase font-display">{{ title }}</h3>
        <p class="text-madison-800 leading-relaxed mb-6">{{ description }}</p>
      </div>
      <div class="flex justify-center">
        <p-button [label]="buttonLabel" (onClick)="onButton.emit()" severity="secondary" [outlined]="true"
          styleClass="uppercase" icon="pi pi-arrow-right" iconPos="right">
        </p-button>
      </div>
    </div>

    <div class="flex-1 rounded-xl overflow-hidden shadow-lg md:h-auto">
      <img [src]="imageSrc" class="w-full h-full object-cover object-center" alt="Card Image">
    </div>
  </div>
</div>
