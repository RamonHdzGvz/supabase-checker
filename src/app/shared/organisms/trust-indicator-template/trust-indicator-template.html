<div class="flex items-center gap-4 p-3 rounded-lg">
  <div class="shrink-0">
    <i [class]="icon" class="text-golden-300" style="font-size: 2.5rem;"></i>
  </div>
  <div class="flex flex-col uppercase">
    <h3 class="text-lg font-bold" [class.text-gray-200]="lightText" [class.text-madison-800]="!lightText">
      {{ title }}
    </h3>
    <p class="text-base font-semibold" [class.text-gray-200]="lightText" [class.text-madison-800]="!lightText">
      {{ subtitle }}
    </p>
  </div>
</div>
