<header class="bg-[#032747] text-white relative z-10">

  <div class="block md:hidden relative px-4 py-3" style="min-height: 110px;">
    <h1 class="headings text-center text-md tracking-wide mb-2">
      PROFESIONALES EN LITIGACIÓN ORAL S.C.
    </h1>
    <div class="absolute left-1/2 -translate-x-1/2 top-12 flex justify-center items-center gap-9">
      <div class="w-26">
        <div class="bg-[#002e5d] border-[#002e5d] rounded-full p-1">
          <img [src]="logo1" class="w-full h-auto" alt="Logo izquierdo">
        </div>
      </div>
      <div class="w-26">
        <div class="bg-white rounded-tl-[20%] rounded-br-[20%] border border-gray-300 p-0">
          <img [src]="logo3" class="w-full h-auto" alt="Logo derecho">
        </div>
      </div>
    </div>
  </div>

  <div class="hidden md:block relative h-30 md:h-25 overflow-visible">
    <div class="absolute top-7 left-0 right-0 flex justify-center items-center gap-12 md:gap-12 px-4">
      <div class="w-26 md:w-26 z-20">
        <div class="bg-[#002e5d] border-[#002e5d] rounded-full p-1">
          <img [src]="logo1" class="w-full h-auto" alt="Logo izquierdo">
        </div>
      </div>
      <h1 class="headings text-center text-md md:text-2xl lg:text-2xl tracking-wide mb-1">
        PROFESIONALES EN LITIGACIÓN ORAL S.C.
      </h1>
      <div class="w-26 md:w-26 z-20">
        <div class="bg-white rounded-tl-[20%] rounded-br-[20%] border border-gray-300 p-0">
          <img [src]="logo3" class="w-full h-auto" alt="Logo derecho">
        </div>
      </div>
    </div>
  </div>

</header>

<div class="bg-white text-white relative h-12 md:h-12 z-0"></div>
