<div class="min-h-screen bg-madison-100/30">
  <main class="flex flex-col justify-center items-center gap-8 py-12 px-4">
    <h1 class="text-4xl font-bold text-madison-900 text-center mb-6 tracking-tight">
      Proyectos de Supabase
    </h1>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10 w-full max-w-5xl">
      @for (project of projects; track project.name) {
      <div class="bg-white rounded-xl p-6 text-center">
        <div class="text-2xl font-semibold text-madison-900 mb-4">
          {{ project.name }}
        </div>
        <p-button label="Enviar" (click)="onButtonClickProject(project)" styleClass="w-full">
        </p-button>
      </div>
      }
    </div>
  </main>
</div>
